services:
  - type: web
    name: jobauto-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    port: 10000
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: jobauto-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: jobauto-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: jobauto-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: jobauto-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: REVIEW_MODE
        value: MANUAL
      - key: CORS_ORIGINS
        value: https://jobauto-pavan.netlify.app
      - key: MAIL_PASS
        value: ""
      - key: ADZUNA_APP_ID
        value: "062831f8"
      - key: ADZUNA_APP_KEY
        value: "7621a31d933c432a96eb0cf627f9b7ae"

databases:
  - name: jobauto-db
    plan: free
    databaseName: job_automation
    user: jobauto
