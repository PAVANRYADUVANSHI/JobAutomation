services:
  mysql:
    image: mysql:8.0
    container_name: job_automation_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}
      MYSQL_DATABASE: job_automation
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_automation_backend
    ports:
      - "8081:8080"
    environment:
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      JWT_SECRET: ${JWT_SECRET:-JobAutomation2024SecretKeyForPavanRYadavKumsi}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      REVIEW_MODE: ${REVIEW_MODE:-MANUAL}
      CORS_ORIGINS: http://localhost:3001,http://10.235.2.106:3001
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/job_automation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_automation_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mysql_data:
