spring.application.name=job-automation
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/job_automation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Jaisriram@2524}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:JobAutomation2024SecretKeyForPavanRYadavKumsi}
jwt.expiration=86400000

# Mail (for daily summary)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USER:pavanryadavkumsi25@gmail.com}
spring.mail.password=${MAIL_PASS:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Job API Keys - set in environment, never hardcode
adzuna.app.id=${ADZUNA_APP_ID:}
adzuna.app.key=${ADZUNA_APP_KEY:}
remoteok.api.url=https://remoteok.com/api
greenhouse.api.base=https://boards-api.greenhouse.io/v1/boards
lever.api.base=https://api.lever.co/v0/postings
ashby.api.base=https://api.ashbyhq.com/posting-public/job-board
wellfound.api.base=https://api.wellfound.com/graphql

# Review mode: MANUAL or AUTO
app.review.mode=${REVIEW_MODE:MANUAL}
app.daily.shortlist.target=50

# Rate limiting (ms between API calls)
app.rate.limit.ms=1000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,https://jobauto.netlify.app}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
