spring.application.name=job-automation
server.port=${PORT:8080}

# Database — Render injects connectionString as SPRING_DATASOURCE_URL via render.yaml
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/job_automation}}
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASS:${PGPASSWORD:password}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Render gives postgres:// — rewrite to jdbc:postgresql://
spring.datasource.hikari.connection-init-sql=SELECT 1

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:JobAutomation2024SecretKeyForPavanRYadavKumsi}
jwt.expiration=86400000

# Mail (for daily summary) — auth disabled if no password set
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USER:pavanryadavkumsi25@gmail.com}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Job API Keys - set in environment, never hardcode
adzuna.app.id=${ADZUNA_APP_ID:}
adzuna.app.key=${ADZUNA_APP_KEY:}
remoteok.api.url=https://remoteok.com/api
greenhouse.api.base=https://boards-api.greenhouse.io/v1/boards
lever.api.base=https://api.lever.co/v0/postings
ashby.api.base=https://api.ashbyhq.com/posting-public/job-board
wellfound.api.base=https://api.wellfound.com/graphql

# Review mode: MANUAL or AUTO
app.review.mode=${REVIEW_MODE:MANUAL}
app.daily.shortlist.target=50

# Rate limiting (ms between API calls)
app.rate.limit.ms=200

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,https://jobauto.netlify.app}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
